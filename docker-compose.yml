services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: platform-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: platform
      RABBITMQ_DEFAULT_PASS: platform

  # ─── Services ─────────────────────────────────────────────────────────────────

  api-gateway:
    build: ./Api-Gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - application-service
      - company-service
      - stack-service
      - curator-service
      - season-service
      - practice-service
      - document-service

  user-service:
    build: ./User-Service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy

  application-service:
    build: ./Application-Service
    container_name: application-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: platform
      SPRING_RABBITMQ_PASSWORD: platform
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  company-service:
    build: ./Company-Service
    container_name: company-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy

  stack-service:
    build: ./Stack-Service
    container_name: stack-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8084
    depends_on:
      postgres:
        condition: service_healthy

  curator-service:
    build: ./Curator-Service
    container_name: curator-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8085
    depends_on:
      postgres:
        condition: service_healthy

  season-service:
    build: ./Season-Service
    container_name: season-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8086
    depends_on:
      postgres:
        condition: service_healthy

  practice-service:
    build: ./Practice-Service
    container_name: practice-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8087
    depends_on:
      postgres:
        condition: service_healthy

  document-service:
    build: ./Document-Service
    container_name: document-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      SERVER_PORT: 8088
    volumes:
      - document_storage:/app/documents
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  document_storage:
